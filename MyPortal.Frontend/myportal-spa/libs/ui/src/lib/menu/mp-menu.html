<ng-template #menu>
  <div class="z-50 min-w-[12rem] rounded-surface border border-border bg-background p-1 shadow-overlay">
    @for (item of model(); track $index) {
      @if (item.separator) {
        <div class="my-1 h-px bg-border"></div>
      } @else {
        <button type="button" [class]="itemClass(item)" [disabled]="item.disabled" (click)="run(item)">
          @if (item.icon) {
            <i [class]="item.icon" class="w-4 shrink-0 text-center"></i>
          }
          <span class="truncate">{{ item.label }}</span>
        </button>
      }
    }
  </div>
</ng-template>

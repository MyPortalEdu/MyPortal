<div class="flex items-stretch gap-1 min-w-[9.5rem]">
  <button
    type="button"
    class="flex h-8 shrink-0 items-center gap-1 rounded-control border border-border px-1.5
           text-xs text-muted-foreground hover:bg-accent hover:text-accent-foreground"
    [attr.aria-label]="triggerLabel()"
    [title]="triggerLabel()"
    (click)="modeMenu.toggle($event)">
    <i [class]="triggerIcon()" class="text-[0.7rem]"></i>
    <i class="fa-solid fa-chevron-down text-[0.55rem] opacity-70"></i>
  </button>

  <div class="flex min-w-0 flex-1 items-center gap-1">
    @if (isBetween()) {
      @switch (type()) {
        @case ('date') {
          <mp-date-picker class="min-w-0 flex-1" [showIcon]="true" placeholder=""
            [ngModel]="fromDate()" (ngModelChange)="onFrom($event)"></mp-date-picker>
          <span class="shrink-0 text-xs text-muted-foreground">–</span>
          <mp-date-picker class="min-w-0 flex-1" [showIcon]="true" placeholder=""
            [ngModel]="toDate()" (ngModelChange)="onTo($event)"></mp-date-picker>
        }
        @default {
          <mp-input-number mode="decimal" [minFractionDigits]="0" [maxFractionDigits]="2"
            class="min-w-0 flex-1" [ngModel]="fromNumber()" (ngModelChange)="onFrom($event)"></mp-input-number>
          <span class="shrink-0 text-xs text-muted-foreground">–</span>
          <mp-input-number mode="decimal" [minFractionDigits]="0" [maxFractionDigits]="2"
            class="min-w-0 flex-1" [ngModel]="toNumber()" (ngModelChange)="onTo($event)"></mp-input-number>
        }
      }
    } @else {
      @switch (type()) {
        @case ('number') {
          <mp-input-number mode="decimal" [minFractionDigits]="0" [maxFractionDigits]="2"
            class="w-full" [ngModel]="numberValue()" (ngModelChange)="onValue($event)"></mp-input-number>
        }
        @case ('date') {
          <mp-date-picker class="w-full" [showIcon]="true" placeholder=""
            [ngModel]="dateValue()" (ngModelChange)="onValue($event)"></mp-date-picker>
        }
        @default {
          <input mpInput type="text" class="h-8 w-full text-xs font-normal"
            [value]="textValue()" [placeholder]="placeholder()" (input)="onText($event)" />
        }
      }
    }
  </div>

  <mp-menu #modeMenu [model]="modeItems()"></mp-menu>
</div>

<ng-container *transloco="let t; prefix: 'roles'">
  <mp-page-header
    [title]="loading() ? t('form.loading') : (model().name || t('form.titleView'))"
    icon="fa-solid fa-user-shield"
    [actions]="headerActions()"></mp-page-header>

  @if (loading()) {
    <mp-card>
      <div class="flex flex-col gap-3">
        @for (i of skeletonRows; track i) {
          <mp-skeleton height="2rem"></mp-skeleton>
        }
      </div>
    </mp-card>
  } @else if (notFound()) {
    <mp-card>
      <div class="py-12 text-center text-muted-foreground">{{ t('form.errorLoad') }}</div>
    </mp-card>
  } @else {
    <form class="flex flex-col gap-4 max-w-5xl">
      @if (readOnly()) {
        <div class="flex items-start gap-2 p-3 rounded-lg bg-muted text-sm text-muted-foreground">
          <i class="fa-solid fa-lock mt-0.5"></i>
          <span>{{ t('form.systemReadonly') }}</span>
        </div>
      }

      <mp-card>
        <div class="flex flex-col gap-4">
          <mp-section-header [title]="t('form.details')" icon="fa-solid fa-circle-info"></mp-section-header>
          <mp-form-field
            [label]="t('form.name')"
            [hint]="nameLocked() && !readOnly() ? t('form.defaultNameLocked') : undefined">
            <input mpInput [formField]="f.name" />
          </mp-form-field>

          <mp-form-field [label]="t('form.description')">
            <textarea mpTextarea [formField]="f.description" rows="2"></textarea>
          </mp-form-field>

          <mp-field [label]="t('form.audience')">
            <div><mp-badge [value]="audienceLabel()"></mp-badge></div>
          </mp-field>
        </div>
      </mp-card>

      <mp-card>
        <div class="flex flex-col gap-2">
          <mp-section-header [title]="t('form.permissions')" icon="fa-solid fa-key"></mp-section-header>
          <span class="text-xs text-muted-foreground">{{ t('form.permissionsHint') }}</span>

          @if (treeNodes().length === 0) {
            <mp-empty-state [message]="t('form.noPermissions')"></mp-empty-state>
          } @else {
            <div class="border border-border rounded-lg p-2 max-h-[28rem] overflow-auto">
              <mp-permission-tree
                [nodes]="treeNodes()"
                [selectedIds]="selectedPermissionIds()"
                [disabled]="readOnly()"
                (toggle)="onToggle($event)"></mp-permission-tree>
            </div>
          }
        </div>
      </mp-card>
    </form>
  }
</ng-container>

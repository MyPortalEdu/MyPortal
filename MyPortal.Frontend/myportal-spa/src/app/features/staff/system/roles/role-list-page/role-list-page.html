<ng-container *transloco="let t; prefix: 'roles'">
  <mp-page-header [title]="t('title')" icon="fa-solid fa-user-shield" [actions]="headerActions()"></mp-page-header>

  <p-card>
    <p-table
      #dt
      [lazy]="true"
      [paginator]="true"
      [rows]="25"
      [totalRecords]="totalRecords()"
      [loading]="loading()"
      [value]="rows()"
      (onLazyLoad)="load($event)"
      [filterDelay]="300"
      [globalFilterFields]="['name', 'description']"
      dataKey="id"
      [scrollable]="true">

      <ng-template pTemplate="caption">
        <div class="flex items-center justify-end">
          <span class="relative w-full sm:w-80">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted-color"></i>
            <input
              pInputText
              type="text"
              class="w-full pl-9"
              [placeholder]="t('searchPlaceholder')"
              (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </span>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">{{ t('columns.name') }} <p-sortIcon field="name"></p-sortIcon></th>
          <th style="width: 9rem">{{ t('columns.audience') }}</th>
          <th style="width: 9rem">{{ t('columns.type') }}</th>
          <th>{{ t('columns.description') }}</th>
          <th style="width: 12rem"></th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-role>
        <tr>
          <td class="font-medium">{{ role.name }}</td>
          <td>
            <p-tag [value]="audienceLabel(role.userType)" [severity]="audienceSeverity(role.userType)"></p-tag>
          </td>
          <td>
            <p-tag [value]="typeLabel(role)" [severity]="typeSeverity(role)"></p-tag>
          </td>
          <td class="text-muted-color">{{ role.description }}</td>
          <td>
            <div class="flex items-center justify-end gap-1">
              <p-button
                [label]="t('edit')"
                icon="fa-solid fa-pen-to-square"
                severity="secondary"
                size="small"
                [text]="true"
                (click)="openEdit(role)"></p-button>
              <span [pTooltip]="canDelete(role) ? '' : t('protectedHint')" tooltipPosition="top">
                <p-button
                  [label]="t('delete')"
                  icon="fa-solid fa-trash-can"
                  severity="danger"
                  size="small"
                  [text]="true"
                  [disabled]="!canDelete(role)"
                  (click)="deleteRole(role)"></p-button>
              </span>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center text-sm text-muted-color py-6">{{ t('empty') }}</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <mp-role-create-dialog
    [visible]="createOpen()"
    (closed)="closeCreate()"
    (created)="onCreated($event)"></mp-role-create-dialog>
</ng-container>

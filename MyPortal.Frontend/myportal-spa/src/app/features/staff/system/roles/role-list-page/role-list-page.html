<ng-container *transloco="let t; prefix: 'roles'">
  <mp-page-header [title]="t('title')" icon="fa-solid fa-user-shield" [actions]="headerActions()"></mp-page-header>

  <mp-card>
    <mp-table
      #dt
      [lazy]="true"
      [paginator]="true"
      [first]="grid.initialState.first"
      [rows]="grid.initialState.rows"
      [sortField]="grid.initialState.sortField ?? null"
      [sortOrder]="grid.initialState.sortOrder ?? 1"
      [totalRecords]="grid.totalRecords()"
      [loading]="grid.loading()"
      [value]="grid.rows()"
      (lazyLoad)="grid.load($event)"
      [filterDelay]="300"
      [filters]="grid.initialFilters"
      [globalFilterFields]="['name', 'description']"
      dataKey="id"
      selectionMode="single"
      [scrollable]="true">

      <ng-template mpTableCaption>
        <div class="flex items-center justify-end">
          <span class="relative w-full sm:w-80">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted-color"></i>
            <input
              mpInput
              type="text"
              class="w-full pl-9 pr-9"
              [placeholder]="t('searchPlaceholder')"
              [value]="grid.searchTerm()"
              (input)="grid.onSearch($any($event.target).value)" />
            @if (grid.searchTerm()) {
              <button
                type="button"
                class="mp-icon-button absolute right-1 top-1/2 h-7 w-7 -translate-y-1/2"
                [attr.aria-label]="t('clearSearch')"
                (click)="grid.clearSearch()">
                <i class="fa-solid fa-xmark text-xs"></i>
              </button>
            }
          </span>
        </div>
      </ng-template>

      <ng-template mpTableHeader>
        <tr>
          <th mpSortable="name">{{ t('columns.name') }} <mp-sort-icon field="name"></mp-sort-icon></th>
          <th style="width: 9rem">{{ t('columns.audience') }}</th>
          <th style="width: 9rem">{{ t('columns.type') }}</th>
          <th>{{ t('columns.description') }}</th>
          <th style="width: 7rem"></th>
        </tr>
      </ng-template>

      <ng-template mpTableBody let-role>
        <tr class="cursor-pointer" (click)="onRowClick($event, role)">
          <td>
            <a [routerLink]="['/staff/system/roles', role.id]" class="font-medium hover:underline">{{ role.name }}</a>
          </td>
          <td>
            <mp-badge [value]="audienceLabel(role.userType)" [severity]="audienceSeverity(role.userType)"></mp-badge>
          </td>
          <td>
            <mp-badge [value]="typeLabel(role)" [severity]="typeSeverity(role)"></mp-badge>
          </td>
          <td class="text-muted-color">{{ role.description }}</td>
          <td>
            <div class="flex items-center justify-end gap-1">
              @if (canEdit()) {
                <span [mpTooltip]="canDelete(role) ? '' : t('protectedHint')" tooltipPosition="top">
                  <button
                    mpButton
                    variant="ghost"
                    size="sm"
                    class="text-destructive hover:text-destructive"
                    [disabled]="!canDelete(role)"
                    (click)="deleteRole(role)"><i class="fa-solid fa-trash-can"></i> {{ t('delete') }}</button>
                </span>
              }
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template mpTableEmpty>
        <tr>
          <td [attr.colspan]="5" class="p-4">
            @if (grid.hasFilter()) {
              <mp-empty-state icon="fa-solid fa-magnifying-glass" [message]="t('emptyFiltered')">
                <button mpButton variant="outline" size="sm" (click)="grid.clearSearch()"><i class="fa-solid fa-xmark"></i> {{ t('clearSearch') }}</button>
              </mp-empty-state>
            } @else {
              <mp-empty-state icon="fa-solid fa-user-shield" [message]="t('emptyNone')">
                @if (canEdit()) {
                  <button mpButton size="sm" (click)="openCreate()"><i class="fa-solid fa-plus"></i> {{ t('new') }}</button>
                }
              </mp-empty-state>
            }
          </td>
        </tr>
      </ng-template>
    </mp-table>
  </mp-card>

  <mp-role-create-dialog
    [visible]="createOpen()"
    (closed)="closeCreate()"
    (created)="onCreated($event)"></mp-role-create-dialog>
</ng-container>

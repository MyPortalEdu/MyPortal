<ng-container *transloco="let t; prefix: 'roles'">
  <mp-dialog
    [visible]="visible()"
    [modal]="true"
    [dismissable]="false"
    [closeOnEscape]="!f().dirty()"
    panelClass="w-[min(32rem,94vw)]"
    (closed)="onHide()"
    [title]="t('form.titleCreate')"
    [closeAriaLabel]="'common.close' | transloco">

    <div class="flex flex-col gap-4">
      <mp-form-field [label]="t('form.name')">
        <input mpInput [formField]="f.name" [placeholder]="t('form.namePlaceholder')" />
      </mp-form-field>

      <mp-form-field [label]="t('form.audience')" [hint]="t('form.audienceHint')">
        <mp-select
          [formField]="f.userType"
          [options]="audienceOptions()"
          optionLabel="label"
          optionValue="value"></mp-select>
      </mp-form-field>

      <p class="hidden sm:block text-xs text-muted-foreground m-0">{{ t('form.createHint') }}</p>
    </div>

    <div mpDialogFooter class="flex items-center justify-end gap-2">
      <button mpButton variant="ghost" (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
      <button mpButton [disabled]="!f().dirty() || f().submitting()" (click)="save()">
        <i class="fa-solid" [class.fa-check]="!f().submitting()" [class.fa-spinner]="f().submitting()" [class.fa-spin]="f().submitting()"></i>
        {{ t('form.create') }}
      </button>
    </div>
  </mp-dialog>
</ng-container>

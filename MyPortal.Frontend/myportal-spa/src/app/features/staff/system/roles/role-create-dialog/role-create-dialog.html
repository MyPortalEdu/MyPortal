<ng-container *transloco="let t; prefix: 'roles'">
  <p-dialog
    [visible]="visible()"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="false"
    [closeOnEscape]="!isDirty()"
    [style]="{ width: 'min(32rem, 94vw)' }"
    styleClass="mp-flush-dialog"
    [showHeader]="false"
    (onHide)="onHide()">

    <div class="flex items-center justify-between p-4 border-b border-surface">
      <h3 class="text-base font-semibold m-0">{{ t('form.titleCreate') }}</h3>
      <button type="button" class="mp-icon-button" (click)="onCancel()" [attr.aria-label]="'common.close' | transloco">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="p-4 flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('form.name') }}</label>
        <input pInputText [ngModel]="name()" (ngModelChange)="name.set($event)" [placeholder]="t('form.namePlaceholder')" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('form.audience') }}</label>
        <p-select
          [ngModel]="userType()"
          (ngModelChange)="userType.set($event)"
          [options]="audienceOptions()"
          optionLabel="label"
          optionValue="value"
          appendTo="body"></p-select>
        <small class="text-muted-color">{{ t('form.audienceHint') }}</small>
      </div>

      <p class="text-xs text-muted-color m-0">{{ t('form.createHint') }}</p>
    </div>

    <div class="flex items-center justify-end gap-2 p-4 border-t border-surface bg-emphasis rounded-b-xl">
      <p-button [label]="'common.cancel' | transloco" severity="secondary" [text]="true" (click)="onCancel()"></p-button>
      <p-button
        [label]="t('form.create')"
        icon="fa-solid fa-check"
        [disabled]="!isValid()"
        [loading]="submitting()"
        (click)="save()"></p-button>
    </div>
  </p-dialog>
</ng-container>

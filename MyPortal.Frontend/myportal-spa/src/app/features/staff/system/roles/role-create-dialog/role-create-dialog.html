<ng-container *transloco="let t; prefix: 'roles'">
  <mp-dialog
    [visible]="visible()"
    [modal]="true"
    [dismissable]="false"
    [closeOnEscape]="!isDirty()"
    panelClass="w-[min(32rem,94vw)]"
    (closed)="onHide()"
    [title]="t('form.titleCreate')"
    [closeAriaLabel]="'common.close' | transloco">

    <div class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('form.name') }}</label>
        <input mpInput [ngModel]="name()" (ngModelChange)="name.set($event)" [placeholder]="t('form.namePlaceholder')" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('form.audience') }}</label>
        <mp-select
          [ngModel]="userType()"
          (ngModelChange)="userType.set($event)"
          [options]="audienceOptions()"
          optionLabel="label"
          optionValue="value"></mp-select>
        <small class="text-muted-color">{{ t('form.audienceHint') }}</small>
      </div>

      <p class="text-xs text-muted-color m-0">{{ t('form.createHint') }}</p>
    </div>

    <div mpDialogFooter class="flex items-center justify-end gap-2">
      <button mpButton variant="ghost" (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
      <button mpButton [disabled]="!isValid() || submitting()" (click)="save()">
        <i class="fa-solid" [class.fa-check]="!submitting()" [class.fa-spinner]="submitting()" [class.fa-spin]="submitting()"></i>
        {{ t('form.create') }}
      </button>
    </div>
  </mp-dialog>
</ng-container>

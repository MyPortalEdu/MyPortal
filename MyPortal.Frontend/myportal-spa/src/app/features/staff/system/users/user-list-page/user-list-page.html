<ng-container *transloco="let t; prefix: 'users'">
  <mp-page-header [title]="t('title')" icon="fa-solid fa-users" [actions]="headerActions()"></mp-page-header>

  <p-card>
    <p-table
      #dt
      [lazy]="true"
      [paginator]="true"
      [rows]="25"
      [totalRecords]="totalRecords()"
      [loading]="loading()"
      [value]="rows()"
      (onLazyLoad)="load($event)"
      [filterDelay]="300"
      [globalFilterFields]="['username', 'email', 'personFullName']"
      dataKey="id"
      [scrollable]="true">

      <ng-template pTemplate="caption">
        <div class="flex items-center justify-end">
          <span class="relative w-full sm:w-80">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted-color"></i>
            <input
              pInputText
              type="text"
              class="w-full pl-9"
              [placeholder]="t('searchPlaceholder')"
              (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </span>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="username">{{ t('columns.username') }} <p-sortIcon field="username"></p-sortIcon></th>
          <th>{{ t('columns.person') }}</th>
          <th style="width: 9rem">{{ t('columns.portal') }}</th>
          <th style="width: 8rem">{{ t('columns.status') }}</th>
          <th style="width: 12rem"></th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td class="font-medium">{{ user.username }}</td>
          <td class="text-muted-color">{{ user.personFullName }}</td>
          <td>
            <p-tag [value]="audienceLabel(user.userType)" [severity]="audienceSeverity(user.userType)"></p-tag>
          </td>
          <td>
            @if (user.isEnabled) {
              <p-tag [value]="t('enabled')" severity="success"></p-tag>
            } @else {
              <p-tag [value]="t('disabled')" severity="secondary"></p-tag>
            }
          </td>
          <td>
            <div class="flex items-center justify-end gap-1">
              <p-button
                [label]="t('edit')"
                icon="fa-solid fa-pen-to-square"
                severity="secondary"
                size="small"
                [text]="true"
                (click)="openEdit(user)"></p-button>
              <span [pTooltip]="user.isSystem ? t('protectedHint') : ''" tooltipPosition="top">
                <p-button
                  [label]="t('delete')"
                  icon="fa-solid fa-trash-can"
                  severity="danger"
                  size="small"
                  [text]="true"
                  [disabled]="user.isSystem"
                  (click)="deleteUser(user)"></p-button>
              </span>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center text-sm text-muted-color py-6">{{ t('empty') }}</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</ng-container>

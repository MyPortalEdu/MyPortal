<ng-container *transloco="let t; prefix: 'users'">
  <p-dialog
    [visible]="visible()"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="false"
    [closeOnEscape]="!isDirty()"
    [style]="{ width: 'min(30rem, 94vw)' }"
    styleClass="mp-flush-dialog"
    [showHeader]="false"
    (onHide)="onHide()">

    <div class="flex items-center justify-between p-4 border-b border-surface">
      <h3 class="text-base font-semibold m-0">{{ t('password.title') }}</h3>
      <button type="button" class="mp-icon-button" (click)="onCancel()" [attr.aria-label]="'common.close' | transloco">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="p-4 flex flex-col gap-4">
      @if (username()) {
        <p class="text-sm text-muted-color m-0">{{ t('password.forUser', { username: username() }) }}</p>
      }
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('password.newPassword') }}</label>
        <input pInputText type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" autocomplete="new-password" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('password.confirm') }}</label>
        <input pInputText type="password" [ngModel]="confirm()" (ngModelChange)="confirm.set($event)" [invalid]="mismatch()" autocomplete="new-password" />
        @if (mismatch()) {
          <small class="text-red-500">{{ t('password.mismatch') }}</small>
        }
      </div>
    </div>

    <div class="flex items-center justify-end gap-2 p-4 border-t border-surface bg-emphasis rounded-b-xl">
      <p-button [label]="'common.cancel' | transloco" severity="secondary" [text]="true" (click)="onCancel()"></p-button>
      <p-button
        [label]="t('password.save')"
        icon="fa-solid fa-check"
        [disabled]="!isValid()"
        [loading]="submitting()"
        (click)="save()"></p-button>
    </div>
  </p-dialog>
</ng-container>

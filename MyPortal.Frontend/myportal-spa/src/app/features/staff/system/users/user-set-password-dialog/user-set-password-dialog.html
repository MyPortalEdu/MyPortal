<ng-container *transloco="let t; prefix: 'users'">
  <mp-dialog
    [visible]="visible()"
    [modal]="true"
    [dismissable]="false"
    [closeOnEscape]="!isDirty()"
    panelClass="w-[min(30rem,94vw)]"
    (closed)="onHide()"
    [title]="t('password.title')"
    [closeAriaLabel]="'common.close' | transloco">

    <div class="flex flex-col gap-4">
      @if (username()) {
        <p class="text-sm text-muted-foreground m-0">{{ t('password.forUser', { username: username() }) }}</p>
      }
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-foreground">{{ t('password.newPassword') }}</label>
        <input mpInput type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" autocomplete="new-password" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-foreground">{{ t('password.confirm') }}</label>
        <input mpInput type="password" [ngModel]="confirm()" (ngModelChange)="confirm.set($event)" [invalid]="mismatch()" autocomplete="new-password" />
        @if (mismatch()) {
          <small class="text-red-500">{{ t('password.mismatch') }}</small>
        }
      </div>
    </div>

    <div mpDialogFooter class="flex items-center justify-end gap-2">
      <button mpButton variant="ghost" (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
      <button
        mpButton
        [disabled]="!isValid() || submitting()"
        (click)="save()"><i class="fa-solid" [class.fa-check]="!submitting()" [class.fa-spinner]="submitting()" [class.fa-spin]="submitting()"></i> {{ t('password.save') }}</button>
    </div>
  </mp-dialog>
</ng-container>

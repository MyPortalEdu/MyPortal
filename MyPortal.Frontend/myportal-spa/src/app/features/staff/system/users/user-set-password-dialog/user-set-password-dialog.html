<ng-container *transloco="let t; prefix: 'users'">
  <mp-dialog
    [visible]="visible()"
    [modal]="true"
    [dismissable]="false"
    [closeOnEscape]="!f().dirty()"
    panelClass="w-[min(30rem,94vw)]"
    (closed)="onHide()"
    [title]="t('password.title')"
    [closeAriaLabel]="'common.close' | transloco">

    <div class="flex flex-col gap-4">
      @if (username()) {
        <p class="text-sm text-muted-foreground m-0">{{ t('password.forUser', { username: username() }) }}</p>
      }
      <mp-form-field [label]="t('password.newPassword')">
        <input mpInput type="password" [formField]="f.password" autocomplete="new-password" />
      </mp-form-field>
      <mp-form-field [label]="t('password.confirm')">
        <input mpInput type="password" [formField]="f.confirm" autocomplete="new-password" />
      </mp-form-field>
    </div>

    <div mpDialogFooter class="flex items-center justify-end gap-2">
      <button mpButton variant="ghost" (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
      <button
        mpButton
        [disabled]="!f().dirty() || f().submitting()"
        (click)="save()"><i class="fa-solid" [class.fa-check]="!f().submitting()" [class.fa-spinner]="f().submitting()" [class.fa-spin]="f().submitting()"></i> {{ t('password.save') }}</button>
    </div>
  </mp-dialog>
</ng-container>

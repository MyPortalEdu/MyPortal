<ng-container *transloco="let t; prefix: 'bulletin-settings'">
<mp-dialog
  [visible]="visible()"
  [modal]="true"
  [dismissable]="false"
  [closeOnEscape]="!isDirty()"
  panelClass="w-[min(40rem,94vw)]"
  (closed)="onHide()"
  [title]="isEdit() ? t('form.titleEdit') : t('form.titleCreate')"
  [closeAriaLabel]="'common.close' | transloco">

  <div class="flex flex-col gap-4">
    <mp-form-field [label]="t('form.name')">
      <input mpInput [placeholder]="t('form.namePlaceholder')" [formField]="f.name" />
    </mp-form-field>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium text-muted-foreground">{{ t('form.icon') }}</label>
      <div class="grid grid-cols-6 sm:grid-cols-10 gap-1.5">
        @for (i of icons; track i) {
          <button
            type="button"
            class="aspect-square rounded-md border border-border flex items-center justify-center hover:bg-muted transition-colors"
            [class.ring-2]="model().icon === i"
            [class.ring-primary]="model().icon === i"
            [class.border-primary]="model().icon === i"
            (click)="setIcon(i)"
            [attr.aria-label]="i"
            [attr.aria-pressed]="model().icon === i">
            <i [class]="i + ' text-base'" [style.color]="model().colour"></i>
          </button>
        }
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-medium text-muted-foreground">{{ t('form.colour') }}</label>
      <div class="flex flex-wrap gap-2">
        @for (c of colours; track c) {
          <button
            type="button"
            class="w-7 h-7 rounded-full border border-border flex items-center justify-center transition-transform"
            [class.ring-2]="model().colour === c"
            [class.ring-offset-2]="model().colour === c"
            [class.scale-110]="model().colour === c"
            [style.backgroundColor]="c"
            [style.borderColor]="c"
            (click)="setColour(c)"
            [attr.aria-label]="c"
            [attr.aria-pressed]="model().colour === c">
            @if (model().colour === c) {
              <i class="fa-solid fa-check text-white text-[0.6875rem]"></i>
            }
          </button>
        }
      </div>
    </div>

    <div class="flex flex-col gap-1 max-w-[8rem]">
      <label class="text-xs font-medium text-muted-foreground">{{ t('form.displayOrder') }}</label>
      <mp-input-number [formField]="f.displayOrder" [min]="0" [max]="999" [showButtons]="false">
      </mp-input-number>
      <span class="text-xs text-muted-foreground leading-snug">{{ t('form.displayOrderHint') }}</span>
    </div>

    <label class="flex items-start gap-2 text-sm cursor-pointer">
      <mp-checkbox [formField]="f.active">
      </mp-checkbox>
      <span class="flex flex-col gap-0.5 leading-tight">
        <span class="font-medium">{{ t('form.active') }}</span>
        <span class="text-muted-foreground text-xs leading-snug">{{ t('form.activeHint') }}</span>
      </span>
    </label>
  </div>

  <div mpDialogFooter class="flex items-center justify-end gap-2">
    <button mpButton variant="ghost" (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
    <button
      mpButton
      [disabled]="!isDirty() || f().submitting()"
      (click)="save()"><i class="fa-solid" [class.fa-check]="!f().submitting()" [class.fa-spinner]="f().submitting()" [class.fa-spin]="f().submitting()"></i> {{ isEdit() ? t('form.save') : t('form.create') }}</button>
  </div>
</mp-dialog>
</ng-container>

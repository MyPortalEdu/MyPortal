<ng-container *transloco="let t">
  <mp-page-header
    [title]="t('staff-members.title')"
    icon="fa-solid fa-id-badge"
    [actions]="headerActions()"
  ></mp-page-header>

  <mp-staff-member-create-dialog
    [open]="createOpen()"
    (closed)="onCreateClosed()"
    (created)="onCreated($event)"
    (openExisting)="onOpenExisting($event)"
  ></mp-staff-member-create-dialog>

  <mp-card>
    <mp-table
      #dt
      [lazy]="true"
      [paginator]="true"
      [first]="grid.initialState.first"
      [rows]="grid.initialState.rows"
      [sortField]="grid.initialState.sortField ?? null"
      [sortOrder]="grid.initialState.sortOrder ?? 1"
      [totalRecords]="grid.totalRecords()"
      [loading]="grid.loading()"
      [value]="grid.rows()"
      (lazyLoad)="grid.load($event)"
      [filterDelay]="300"
      [filters]="initialFilters"
      [columns]="columns()"
      [rowClickable]="true"
      (rowClick)="openDetails($any($event))"
      [scrollable]="true">

      <ng-template mpCell="avatar" let-row>
        <div class="flex h-9 w-9 items-center justify-center rounded-full bg-primary-100 text-sm font-semibold text-primary-700 dark:bg-primary-900/40 dark:text-primary-200">
          {{ initials(row) }}
        </div>
      </ng-template>

      <ng-template mpCell="name" let-row>
        <a [routerLink]="['/staff/people/staff-members', row.id]"
          class="font-medium hover:underline">{{ displayName(row) }}</a>
        @if (legalName(row); as legal) {
          <div class="text-xs text-muted-foreground">{{ legal }}</div>
        }
      </ng-template>

      <ng-template mpCell="gender" let-row>{{ genderLabel(row) }}</ng-template>

      <ng-template mpCell="startDate" let-row>{{ startDate(row) || '—' }}</ng-template>

      <ng-template mpCell="status" let-row>
        <mp-badge
          [value]="t('staff-members.status.' + row.status)"
          [severity]="statusSeverity(row.status)"></mp-badge>
      </ng-template>

      <ng-template mpTableEmpty>
        <tr>
          <td [attr.colspan]="8" class="p-4">
            @if (hasFilter()) {
              <mp-empty-state
                icon="fa-solid fa-magnifying-glass"
                [message]="t('staff-members.emptyFiltered')">
                <button mpButton variant="outline" size="sm" (click)="clearFilters()"><i class="fa-solid fa-xmark"></i> {{ t('staff-members.clearFilters') }}</button>
              </mp-empty-state>
            } @else {
              <mp-empty-state icon="fa-solid fa-id-badge" [message]="t('staff-members.emptyNone')">
                @if (canCreate()) {
                  <button mpButton size="sm" (click)="createOpen.set(true)"><i class="fa-solid fa-plus"></i> {{ t('staff-members.new') }}</button>
                }
              </mp-empty-state>
            }
          </td>
        </tr>
      </ng-template>
    </mp-table>
  </mp-card>
</ng-container>

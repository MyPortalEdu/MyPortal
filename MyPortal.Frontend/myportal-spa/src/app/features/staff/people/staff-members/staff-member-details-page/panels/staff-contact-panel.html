<ng-container *transloco="let t">
  @if (loading() && !contact()) {
    <div class="flex justify-center py-10">
      <p-progressSpinner [style]="{ width: '2rem', height: '2rem' }"></p-progressSpinner>
    </div>
  } @else if (contact()) {
    <h3 class="text-base font-semibold mb-1">{{ t('staff-members.areas.contactDetails') }}</h3>
    <p class="text-sm text-muted-color mb-4">
      {{ t('staff-members.contact.hint') }}
    </p>

    <div class="flex flex-col gap-6">
      <section>
        <h4 class="flex items-center gap-2 text-sm font-semibold mb-3 pb-2 border-b border-surface-200 dark:border-surface-700">
          <i class="fa-solid fa-envelope text-muted-color"></i>
          {{ t('staff-members.contact.emailsHeading') }}
        </h4>
        <mp-person-emails
          [emails]="emails()"
          (emailsChange)="emails.set($event)"
          [types]="emailTypes()"
          [editing]="editing()"></mp-person-emails>
      </section>

      <section>
        <h4 class="flex items-center gap-2 text-sm font-semibold mb-3 pb-2 border-b border-surface-200 dark:border-surface-700">
          <i class="fa-solid fa-phone text-muted-color"></i>
          {{ t('staff-members.contact.phonesHeading') }}
        </h4>
        <mp-person-phones
          [phones]="phones()"
          (phonesChange)="phones.set($event)"
          [types]="phoneTypes()"
          [editing]="editing()"></mp-person-phones>
      </section>

      <section>
        <h4 class="flex items-center gap-2 text-sm font-semibold mb-3 pb-2 border-b border-surface-200 dark:border-surface-700">
          <i class="fa-solid fa-location-dot text-muted-color"></i>
          {{ t('staff-members.contact.addressesHeading') }}
        </h4>
        <mp-person-addresses
          [staffMemberId]="staffMemberId()"
          [canEdit]="canEdit()"></mp-person-addresses>
      </section>
    </div>
  }
</ng-container>

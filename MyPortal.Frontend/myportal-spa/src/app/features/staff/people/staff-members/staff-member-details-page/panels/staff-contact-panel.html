<ng-container *transloco="let t">
  @if (loading() && !contact()) {
    <mp-loading></mp-loading>
  } @else if (contact()) {
    <h3 class="text-base font-semibold mb-1">{{ t('staff-members.areas.contactDetails') }}</h3>
    <p class="text-sm text-muted-color mb-4">
      {{ t('staff-members.contact.hint') }}
    </p>

    <div class="flex flex-col gap-6">
      <section>
        <mp-section-header icon="fa-solid fa-envelope" [title]="t('staff-members.contact.emailsHeading')"></mp-section-header>
        <mp-person-emails
          [emails]="emails()"
          (emailsChange)="emails.set($event)"
          [types]="emailTypes()"
          [editing]="editing()"></mp-person-emails>
      </section>

      <section>
        <mp-section-header icon="fa-solid fa-phone" [title]="t('staff-members.contact.phonesHeading')"></mp-section-header>
        <mp-person-phones
          [phones]="phones()"
          (phonesChange)="phones.set($event)"
          [types]="phoneTypes()"
          [editing]="editing()"></mp-person-phones>
      </section>

      <!-- Addresses commit immediately (shared-address semantics can't stage behind the panel's
           Save), so they sit outside the staged Emails/Phones region above. -->
      <section class="border-t border-surface pt-6">
        <mp-section-header icon="fa-solid fa-location-dot" [title]="t('staff-members.contact.addressesHeading')"></mp-section-header>
        <p class="text-sm text-muted-color -mt-2 mb-3">
          {{ t('staff-members.contact.addressesHint') }}
        </p>
        <mp-person-addresses
          [staffMemberId]="staffMemberId()"
          [canEdit]="canEdit()"></mp-person-addresses>
      </section>
    </div>
  }
</ng-container>

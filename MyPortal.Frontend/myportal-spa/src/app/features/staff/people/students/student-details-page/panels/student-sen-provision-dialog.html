<ng-container *transloco="let t">
  <mp-dialog
    [visible]="open()"
    (visibleChange)="$event ? null : onClose()"
    [modal]="true"
    [closeOnEscape]="!saving()"
    panelClass="w-[min(36rem,92vw)]"
    [dismissable]="false"
    [title]="isEdit() ? t('students.sen.provisions.editTitle') : t('students.sen.provisions.addTitle')"
    [closeAriaLabel]="t('common.cancel')"
    [closeDisabled]="saving()">

    <div class="flex flex-col gap-4">
      <mp-field [label]="t('students.sen.provisions.type')" for="sen-provision-type" [required]="true" [field]="f.senProvisionTypeId">
        <mp-select
          inputId="sen-provision-type"
          [options]="provisionTypes()"
          optionLabel="description"
          optionValue="id"
          [formField]="f.senProvisionTypeId"
          [placeholder]="t('students.sen.provisions.typePlaceholder')"
          class="w-full"></mp-select>
      </mp-field>

      <div class="grid gap-4 md:grid-cols-2">
        <mp-field [label]="t('students.sen.provisions.startDate')" [required]="true" [field]="f.startDate">
          <mp-date-picker [formField]="f.startDate" [showIcon]="true" class="w-full"></mp-date-picker>
        </mp-field>
        <mp-field [label]="t('students.sen.provisions.endDate')" [field]="f.endDate">
          <mp-date-picker [formField]="f.endDate" [showIcon]="true" class="w-full"></mp-date-picker>
        </mp-field>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <mp-field [label]="t('students.sen.provisions.frequency')" for="sen-provision-frequency">
          <input mpInput id="sen-provision-frequency" [formField]="f.frequency" />
        </mp-field>
        <mp-field [label]="t('students.sen.provisions.cost')" for="sen-provision-cost">
          <mp-input-number inputId="sen-provision-cost" mode="currency" [min]="0" [formField]="f.cost" class="w-full"></mp-input-number>
        </mp-field>
      </div>

      <mp-field [label]="t('students.sen.provisions.note')" [required]="true" [field]="f.note">
        <textarea mpTextarea rows="2" [formField]="f.note"></textarea>
      </mp-field>
    </div>

    <div mpDialogFooter>
      <div class="flex items-center justify-end gap-2">
        <button mpButton
          variant="outline"
          [disabled]="saving()"
          (click)="onClose()"><i class="fa-solid fa-xmark"></i> {{ t('common.cancel') }}</button>
        <button mpButton
          [disabled]="saving()"
          (click)="submit()"><i class="fa-solid" [class.fa-check]="!saving()" [class.fa-spinner]="saving()" [class.fa-spin]="saving()"></i> {{ t('common.save') }}</button>
      </div>
    </div>
  </mp-dialog>
</ng-container>

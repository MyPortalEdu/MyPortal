<ng-container *transloco="let t">
  <mp-dialog
    [visible]="open()"
    (visibleChange)="$event ? null : onClose()"
    [modal]="true"
    [closeOnEscape]="!saving()"
    panelClass="w-[min(36rem,92vw)]"
    [dismissable]="false"
    [title]="isEdit() ? t('students.welfare.careEpisodes.editTitle') : t('students.welfare.careEpisodes.addTitle')"
    [closeAriaLabel]="t('common.cancel')"
    [closeDisabled]="saving()">

    <div class="flex flex-col gap-4">
      <mp-field [label]="t('students.welfare.careEpisodes.caringAuthority')" for="care-authority" [required]="true" [field]="f.caringAuthorityId">
        <mp-select
          inputId="care-authority"
          [options]="caringAuthorities()"
          optionLabel="description"
          optionValue="id"
          [formField]="f.caringAuthorityId"
          [placeholder]="t('students.welfare.careEpisodes.caringAuthorityPlaceholder')"
          class="w-full"></mp-select>
      </mp-field>

      <mp-field [label]="t('students.welfare.careEpisodes.livingArrangement')" for="care-living">
        <mp-select
          inputId="care-living"
          [options]="livingArrangements()"
          optionLabel="description"
          optionValue="id"
          [showClear]="true"
          [formField]="f.livingArrangementId"
          [placeholder]="t('students.welfare.careEpisodes.livingArrangementPlaceholder')"
          class="w-full"></mp-select>
      </mp-field>

      <div class="grid gap-4 md:grid-cols-2">
        <mp-field [label]="t('students.welfare.careEpisodes.startDate')" [required]="true" [field]="f.startDate">
          <mp-date-picker [formField]="f.startDate" [showIcon]="true" class="w-full"></mp-date-picker>
        </mp-field>
        <mp-field [label]="t('students.welfare.careEpisodes.endDate')" [field]="f.endDate">
          <mp-date-picker [formField]="f.endDate" [showIcon]="true" class="w-full"></mp-date-picker>
        </mp-field>
      </div>

      <mp-field [label]="t('students.welfare.careEpisodes.comment')" [field]="f.comment">
        <textarea mpTextarea rows="2" [formField]="f.comment"></textarea>
      </mp-field>
    </div>

    <div mpDialogFooter>
      <div class="flex items-center justify-end gap-2">
        <button mpButton
          variant="outline"
          [disabled]="saving()"
          (click)="onClose()"><i class="fa-solid fa-xmark"></i> {{ t('common.cancel') }}</button>
        <button mpButton
          [disabled]="saving()"
          (click)="submit()"><i class="fa-solid" [class.fa-check]="!saving()" [class.fa-spinner]="saving()" [class.fa-spin]="saving()"></i> {{ t('common.save') }}</button>
      </div>
    </div>
  </mp-dialog>
</ng-container>

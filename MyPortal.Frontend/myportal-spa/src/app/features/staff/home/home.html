<ng-container *transloco="let t">
<mp-page-header
  [title]="t('pages.home.title')"
  icon="fa-solid fa-house"
></mp-page-header>

@if (showSchoolSetup()) {
  <div class="mb-4 flex items-start gap-3 p-4 rounded-xl border border-primary/40 bg-primary/10">
    <i class="fa-solid fa-circle-exclamation text-primary text-xl mt-0.5"></i>
    <div class="flex-1 min-w-0 flex flex-col gap-0.5">
      <span class="font-semibold">{{ t('pages.home.schoolSetup.title') }}</span>
      <span class="text-sm text-muted-color">{{ t('pages.home.schoolSetup.body') }}</span>
    </div>
    <p-button
      [label]="t('pages.home.schoolSetup.action')"
      icon="fa-solid fa-arrow-right"
      iconPos="right"
      routerLink="/staff/school/details">
    </p-button>
  </div>
}

@if (showAcademicYearSetup()) {
  <div class="mb-4 flex items-start gap-3 p-4 rounded-xl border border-primary/40 bg-primary/10">
    <i class="fa-solid fa-circle-exclamation text-primary text-xl mt-0.5"></i>
    <div class="flex-1 min-w-0 flex flex-col gap-0.5">
      <span class="font-semibold">{{ t('pages.home.academicYearSetup.title') }}</span>
      <span class="text-sm text-muted-color">{{ t('pages.home.academicYearSetup.body') }}</span>
    </div>
    <p-button
      [label]="t('pages.home.academicYearSetup.action')"
      icon="fa-solid fa-arrow-right"
      iconPos="right"
      routerLink="/staff/curriculum/academic-years">
    </p-button>
  </div>
}

<div class="flex flex-col md:flex-row gap-4">
  <!-- Matches the bulletins-feed widget's section styling (bg/radius/shadow/
       padding/gap) so the two dashboard cards read as a consistent pair.
       Extract to a shared class if a third widget joins them. -->
  <section class="flex-1 min-w-0 flex flex-col bg-[var(--p-content-background)] rounded-xl shadow-sm p-4 gap-3">
    <div class="flex items-center gap-3">
      <i class="fa-regular fa-calendar text-primary text-xl"></i>
      <h3 class="text-base font-semibold m-0">{{ t('pages.home.timetable') }}</h3>
    </div>
    <mp-staff-timetable [self]="true"></mp-staff-timetable>
  </section>
  <mp-bulletins-feed class="flex-1 min-w-0"></mp-bulletins-feed>
</div>
</ng-container>

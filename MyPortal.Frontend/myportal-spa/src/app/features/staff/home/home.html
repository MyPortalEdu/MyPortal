<ng-container *transloco="let t">
<mp-page-header
  [title]="t('pages.home.title')"
  icon="fa-solid fa-house"
></mp-page-header>

<div class="flex flex-col md:flex-row gap-4">
  <!-- Matches the bulletins-feed widget's section styling (bg/radius/shadow/
       padding/gap) so the two dashboard cards read as a consistent pair.
       Extract to a shared class if a third widget joins them. -->
  <section class="flex-1 flex flex-col bg-[var(--p-content-background)] rounded-xl shadow-sm p-4 gap-3">
    <div class="flex items-center gap-3">
      <i class="fa-regular fa-calendar text-primary text-xl"></i>
      <h3 class="text-base font-semibold m-0">{{ t('pages.home.timetable') }}</h3>
    </div>
    <div class="text-sm text-muted-color">{{ t('pages.home.timetablePlaceholder') }}</div>
  </section>
  <mp-bulletins-feed class="flex-1"></mp-bulletins-feed>
</div>
</ng-container>

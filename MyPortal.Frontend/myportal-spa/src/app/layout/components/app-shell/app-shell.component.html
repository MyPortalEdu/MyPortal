<mp-topbar (menuToggle)="toggleSidebar()"></mp-topbar>

<mp-drawer
  [visible]="!isDesktop() && sidebarOpen()"
  (closed)="closeSidebar()"
  position="left"
  [modal]="true"
>
  <ng-container *transloco="let t">
  <div class="flex h-full flex-col
                bg-surface-200 dark:bg-surface-800
                text-foreground">

    <div class="flex items-center justify-between px-4 py-3
                  border-b border-surface-300 dark:border-surface-700">
      <span class="font-semibold text-lg">{{ t('topbar.appName') }}</span>
      <button mpButton variant="ghost" size="icon" (click)="closeSidebar()" [attr.aria-label]="t('common.close')"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="flex-1 overflow-auto">
      <mp-sidebar></mp-sidebar>
    </div>
  </div>
  </ng-container>
</mp-drawer>

<div class="flex min-h-[calc(100dvh-3.5rem)] overflow-hidden">

  <!-- Reserves the rail's width in the flow; the panel inside overlays when peeked, so hovering
       a collapsed rail floats the sidebar over the content instead of pushing it. -->
  <div
    class="hidden lg:block shrink-0 relative transition-[width] duration-200 ease-out"
    [class.w-72]="!sidebarCollapsed()"
    [class.w-16]="sidebarCollapsed()"
  >
    <aside
      class="absolute inset-y-0 left-0 z-[1001] flex flex-col overflow-hidden
           bg-surface-200 dark:bg-surface-800
           border-r border-surface-300 dark:border-surface-700
           text-foreground
           transition-[width] duration-200 ease-out"
      [class.w-72]="!sidebarCollapsed() || hoverExpanded()"
      [class.w-16]="sidebarCollapsed() && !hoverExpanded()"
      [class.shadow-xl]="sidebarCollapsed() && hoverExpanded()"
      (mouseenter)="onSidebarEnter()"
      (mouseleave)="onSidebarLeave()"
      (focusin)="onSidebarEnter()"
      (focusout)="onSidebarFocusOut($event)"
    >
      <mp-sidebar
        [collapsed]="sidebarCollapsed() && !hoverExpanded()"
        (expandRequested)="expandSidebar()"></mp-sidebar>
    </aside>
  </div>

  <main
    class="flex-1 overflow-auto bg-surface-50 dark:bg-surface-950 text-foreground p-4 lg:p-6 transition-colors"
  >
    <router-outlet></router-outlet>
  </main>
</div>

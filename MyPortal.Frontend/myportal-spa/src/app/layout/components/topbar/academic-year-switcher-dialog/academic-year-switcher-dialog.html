<ng-container *transloco="let t; prefix: 'topbar.yearSwitcher'">
<mp-dialog
  [visible]="visible()"
  (visibleChange)="$event ? null : onHide()"
  [modal]="true"
  [closeOnEscape]="true"
  [dismissable]="true"
  panelClass="w-[min(28rem,95vw)]"
  [title]="t('title')"
  [closeAriaLabel]="'common.close' | transloco">

  <div class="flex flex-col gap-3 min-h-[12rem]">
    @if (loading()) {
      <div class="flex flex-col items-center justify-center min-h-[12rem] gap-3">
        <mp-spinner size="2rem"></mp-spinner>
      </div>
    } @else if (rows().length === 0) {
      <div class="text-sm text-muted-foreground py-6 text-center border border-dashed border-border rounded-lg">
        {{ t('empty') }}
      </div>
    } @else {
      <ul class="list-none m-0 p-0 flex flex-col gap-1">
        @for (year of rows(); track year.id) {
          <li>
            <button type="button"
                    class="w-full flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent
                           hover:bg-surface-100 dark:hover:bg-surface-800
                           focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary
                           text-left"
                    [class.!border-primary]="year.id === selectedId()"
                    [class]="year.id === selectedId() ? 'bg-primary-50 dark:bg-primary-900/30' : ''"
                    (click)="pick(year)">
              <i class="fa-solid fa-check text-primary"
                 [class.invisible]="year.id !== selectedId()"></i>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="font-medium truncate">{{ year.name }}</span>
                  @if (year.id === currentId()) {
                    <mp-badge [value]="t('currentBadge')" severity="success"></mp-badge>
                  }
                  @if (year.isLocked) {
                    <mp-badge [value]="t('lockedBadge')" severity="warn" icon="fa-solid fa-lock"></mp-badge>
                  }
                </div>
              </div>
            </button>
          </li>
        }
      </ul>
    }
  </div>
</mp-dialog>
</ng-container>

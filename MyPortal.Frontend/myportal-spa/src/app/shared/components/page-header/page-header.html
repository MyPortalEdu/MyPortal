<header class="mp-surface flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between px-4 py-3 mb-4">
  <div class="flex items-center gap-2 min-w-0">
    @if (icon(); as i) {
      <i [class]="i + ' text-primary mr-2 text-lg'"></i>
    }
    <div class="min-w-0">
      <span class="mp-title truncate">{{ title() }}</span>
      @if (subtitle(); as s) {
        <span class="text-sm text-muted-color ml-2">{{ s }}</span>
      }
    </div>
  </div>

  <div class="flex flex-wrap items-center gap-2">
    @for (a of actions(); track a) {
      <button
        mpButton
        size="sm"
        type="button"
        [variant]="variantFor(a)"
        [disabled]="a.disabled || a.loading"
        (click)="a.command?.()">
        @if (a.loading) {
          <i class="fa-solid fa-circle-notch fa-spin"></i>
        } @else if (a.icon) {
          <i [class]="a.icon"></i>
        }
        {{ a.label }}
      </button>
    }
  </div>
</header>

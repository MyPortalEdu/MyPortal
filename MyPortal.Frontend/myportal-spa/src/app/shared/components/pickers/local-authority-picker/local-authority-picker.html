<ng-container *transloco="let t">
  <button mpButton variant="secondary" (click)="visible.set(true)">
    <i class="fa-solid fa-magnifying-glass"></i> {{ buttonLabel() ?? t('common.localAuthorityPicker.pick') }}
  </button>

  <mp-dialog [(visible)]="visible" panelClass="w-[min(40rem,92vw)]" [ariaLabel]="t('common.localAuthorityPicker.title')">
    <div class="flex items-center justify-between p-3 border-b border-border">
      <span class="text-sm font-semibold">{{ t('common.localAuthorityPicker.title') }}</span>
      <button type="button" class="mp-icon-button" (click)="visible.set(false)" [attr.aria-label]="'common.close' | transloco">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="p-2">
      <mp-table
        [lazy]="true"
        [paginator]="true"
        [rows]="25"
        [totalRecords]="totalRecords()"
        [loading]="loading()"
        [value]="rows()"
        (lazyLoad)="load($event)"
        [filterDelay]="300"
        dataKey="id"
        selectionMode="single"
        (rowSelect)="onRowSelect($any($event))"
        [scrollable]="true"
        scrollHeight="20rem">

        <ng-template mpTableHeader>
          <tr>
            <th mpSortable="leaCode" style="width: 10rem">
              {{ t('common.localAuthorityPicker.leaCode') }}
              <mp-sort-icon field="leaCode"></mp-sort-icon>
            </th>
            <th mpSortable="name">
              {{ t('common.localAuthorityPicker.name') }}
              <mp-sort-icon field="name"></mp-sort-icon>
            </th>
          </tr>
          <tr>
            <th>

              <mp-column-filter field="leaCode" matchMode="contains"></mp-column-filter>
            </th>
            <th>
              <mp-column-filter field="name" matchMode="contains"></mp-column-filter>
            </th>
          </tr>
        </ng-template>

        <ng-template mpTableBody let-row>
          <tr [mpSelectableRow]="row">
            <td class="font-mono text-xs">{{ row.leaCode }}</td>
            <td>{{ row.name }}</td>
          </tr>
        </ng-template>

        <ng-template mpTableEmpty>
          <tr>
            <td colspan="2" class="text-center text-sm text-muted-color py-4">
              {{ t('common.localAuthorityPicker.empty') }}
            </td>
          </tr>
        </ng-template>
      </mp-table>
    </div>
  </mp-dialog>
</ng-container>

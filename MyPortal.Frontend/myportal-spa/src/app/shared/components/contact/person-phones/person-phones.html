<ng-container *transloco="let t">
  <div class="flex flex-col gap-3">
    @if (editing()) {
      @for (row of field(); track $index) {
        @let v = row().value();
        <div class="flex flex-wrap items-start gap-2 rounded border border-surface-200 dark:border-surface-700 p-3">
          <mp-field class="w-40" [label]="t('common.contact.type')" [field]="row.typeId">
            <mp-select
              class="w-full"
              [options]="types()"
              optionLabel="description"
              optionValue="id"
              [placeholder]="t('common.contact.type')"
              [formField]="row.typeId"></mp-select>
          </mp-field>

          <mp-field class="flex-1 min-w-48" [label]="t('common.contact.phone')" [field]="row.number">
            <input
              mpInput
              type="tel"
              class="w-full"
              [placeholder]="t('common.contact.phonePlaceholder')"
              [formField]="row.number" />
          </mp-field>

          <button
            type="button"
            class="mt-7 flex items-center gap-1 text-sm"
            [attr.aria-pressed]="v.isMain"
            (click)="setMain.emit($index)">
            <i [class]="v.isMain ? 'fa-solid fa-circle-dot text-primary-600' : 'fa-regular fa-circle text-muted-foreground'"></i>
            {{ t('common.contact.main') }}
          </button>

          <button
            mpButton
            variant="ghost"
            size="icon"
            type="button"
            class="mt-6"
            [attr.aria-label]="t('common.delete')"
            (click)="remove.emit($index)">
            <i class="fa-solid fa-trash text-destructive"></i>
          </button>
        </div>
      }

      <div>
        <button
          mpButton
          variant="outline"
          size="sm"
          type="button"
          [disabled]="!types().length"
          (click)="add.emit()">
          <i class="fa-solid fa-plus"></i>
          {{ t('common.contact.addPhone') }}
        </button>
      </div>
    } @else {
      @if (items().length) {
        <div class="flex flex-col divide-y divide-surface-200 dark:divide-surface-700">
          @for (phone of items(); track $index) {
            <div class="flex items-center gap-3 py-2">
              <span class="w-20 shrink-0 text-xs text-muted-foreground">{{ typeName(phone.typeId) }}</span>
              <span class="flex-1 min-w-0 truncate font-medium">{{ phone.number }}</span>
              @if (phone.isMain) {
                <i class="fa-solid fa-star text-amber-400" [title]="t('common.contact.main')" [attr.aria-label]="t('common.contact.main')"></i>
              }
              <mp-copy-button [value]="phone.number"></mp-copy-button>
              <a
                class="mp-icon-button shrink-0"
                [href]="telHref(phone.number)"
                [title]="t('common.contact.call')"
                [attr.aria-label]="t('common.contact.call')">
                <i class="fa-solid fa-phone text-sm"></i>
              </a>
            </div>
          }
        </div>
      } @else {
        <span class="text-sm text-muted-foreground">{{ t('common.contact.noPhones') }}</span>
      }
    }
  </div>
</ng-container>

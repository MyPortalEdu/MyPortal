<ng-container *transloco="let t">
  <div class="flex flex-col gap-3">
    @if (editing()) {
      @for (phone of phones(); track $index) {
        <div class="flex flex-wrap items-center gap-2 rounded border border-surface-200 dark:border-surface-700 p-3">
          <mp-select
            class="w-40"
            [options]="types()"
            optionLabel="description"
            optionValue="id"
            [placeholder]="t('common.contact.type')"
            [ngModel]="phone.typeId"
            (ngModelChange)="patch($index, { typeId: $event })"></mp-select>

          <input
            mpInput
            type="tel"
            class="flex-1 min-w-48"
            [placeholder]="t('common.contact.phonePlaceholder')"
            [ngModel]="phone.number"
            (ngModelChange)="patch($index, { number: $event })" />

          <button
            type="button"
            class="flex items-center gap-1 text-sm"
            [attr.aria-pressed]="phone.isMain"
            (click)="setMain($index)">
            <i [class]="phone.isMain ? 'fa-solid fa-circle-dot text-primary-600' : 'fa-regular fa-circle text-muted-color'"></i>
            {{ t('common.contact.main') }}
          </button>

          <button
            mpButton
            variant="ghost"
            size="icon"
            type="button"
            [attr.aria-label]="t('common.delete')"
            (click)="removePhone($index)">
            <i class="fa-solid fa-trash text-destructive"></i>
          </button>
        </div>
      }

      <div>
        <button
          mpButton
          variant="outline"
          size="sm"
          type="button"
          [disabled]="!types().length"
          (click)="addPhone()">
          <i class="fa-solid fa-plus"></i>
          {{ t('common.contact.addPhone') }}
        </button>
      </div>
    } @else {
      @if (phones().length) {
        <div class="flex flex-col divide-y divide-surface-200 dark:divide-surface-700">
          @for (phone of phones(); track $index) {
            <div class="flex items-center gap-3 py-2">
              <span class="w-20 shrink-0 text-xs text-muted-color">{{ typeName(phone.typeId) }}</span>
              <span class="flex-1 min-w-0 truncate font-medium">{{ phone.number }}</span>
              @if (phone.isMain) {
                <i class="fa-solid fa-star text-amber-400" [title]="t('common.contact.main')" [attr.aria-label]="t('common.contact.main')"></i>
              }
              <mp-copy-button [value]="phone.number"></mp-copy-button>
              <a
                class="mp-icon-button shrink-0"
                [href]="telHref(phone.number)"
                [title]="t('common.contact.call')"
                [attr.aria-label]="t('common.contact.call')">
                <i class="fa-solid fa-phone text-sm"></i>
              </a>
            </div>
          }
        </div>
      } @else {
        <span class="text-sm text-muted-color">{{ t('common.contact.noPhones') }}</span>
      }
    }
  </div>
</ng-container>

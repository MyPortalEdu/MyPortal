<ng-container *transloco="let t; prefix: 'bulletins'">
<p-dialog
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="false"
  [closeOnEscape]="true"
  [style]="{ width: 'min(44rem, 94vw)' }"
  styleClass="bulletin-form-dialog"
  (onHide)="onHide()"
  [showHeader]="false">

  <!-- Header -->
  <div class="flex items-center justify-between p-3 border-b border-surface">
    <div class="flex items-center gap-2">
      <i class="pi pi-bell text-primary"></i>
      <h3 class="text-sm font-semibold m-0">{{ isEdit() ? t('form.titleEdit') : t('form.titleCreate') }}</h3>
    </div>
    <button type="button" class="mp-icon-button" (click)="onCancel()" [attr.aria-label]="t('detail.close')">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <div class="p-4 flex flex-col gap-3">
    <!-- Title -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.titleLabel') }}</label>
      <input
        pInputText
        [placeholder]="t('form.titlePlaceholder')"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)" />
    </div>

    <!-- Category + Pin -->
    <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-3 sm:items-end">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('form.category') }}</label>
        <p-select
          [options]="categories()"
          optionLabel="name"
          optionValue="id"
          [placeholder]="t('form.categoryPlaceholder')"
          appendTo="body"
          [ngModel]="categoryId()"
          (ngModelChange)="categoryId.set($event)"
          [style]="{ width: '100%' }">
        </p-select>
      </div>

      @if (canPin()) {
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-muted-color">{{ t('form.pinLabel') }}</label>
          <label class="flex items-start gap-2 text-sm">
            <p-checkbox
              [binary]="true"
              [ngModel]="isPinned()"
              (ngModelChange)="isPinned.set($event)">
            </p-checkbox>
            <span class="text-muted-color text-xs leading-snug">{{ t('form.pinHint') }}</span>
          </label>
        </div>
      }
    </div>

    <!-- Audience. Active state is fixed primary tint (unlike the feed's
         category chips which use per-category colours). -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.audienceLabel') }}</label>
      <div class="flex flex-wrap gap-2">
        @for (a of audienceChoices(); track a.key) {
          <button
            type="button"
            class="mp-chip"
            [class.mp-chip-active]="isSelected(a.key)"
            (click)="toggleAudience(a.key)">
            @if (isSelected(a.key)) {
              <i class="pi pi-check"></i>
            }
            {{ audienceLabel(a) }}
          </button>
        }
      </div>
    </div>

    <!-- Body -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.bodyLabel') }}</label>
      <textarea
        pInputTextarea
        rows="5"
        [placeholder]="t('form.bodyPlaceholder')"
        [ngModel]="detail()"
        (ngModelChange)="detail.set($event)">
      </textarea>
    </div>

    <!-- Attachments. Placeholder UI: file upload is a follow-up; the dropzone
         is here so the layout matches the spec but it's a no-op for now. -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.attachmentsLabel') }}</label>
      <div class="flex items-center justify-center gap-2 p-3 border border-dashed border-surface rounded-lg bg-surface-50 text-xs text-muted-color">
        <i class="pi pi-paperclip"></i>
        <span>{{ t('form.attachmentsDrop') }} <a class="underline">{{ t('form.attachmentsBrowse') }}</a></span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between gap-3 p-3 border-t border-surface">
    <label class="flex items-center gap-2 text-sm">
      <p-checkbox
        [binary]="true"
        [ngModel]="requiresAck()"
        (ngModelChange)="requiresAck.set($event)">
      </p-checkbox>
      {{ t('form.requireAck') }}
    </label>

    <div class="flex items-center gap-2">
      <p-button [label]="'common.cancel' | transloco" severity="secondary" [text]="true" (click)="onCancel()"></p-button>
      <p-button
        [label]="isEdit() ? t('form.saveChanges') : t('form.publish')"
        [icon]="isEdit() ? 'pi pi-check' : 'pi pi-send'"
        [disabled]="!isValid()"
        [loading]="submitting()"
        (click)="publish()">
      </p-button>
    </div>
  </div>
</p-dialog>
</ng-container>

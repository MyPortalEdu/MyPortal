<ng-container *transloco="let t; prefix: 'bulletins'">
<mp-dialog
  [visible]="visible()"
  [modal]="true"
  [dismissable]="false"
  [closeOnEscape]="!isDirty()"
  panelClass="w-[min(44rem,94vw)]"
  (closed)="onHide()"
  [title]="isEdit() ? t('form.titleEdit') : t('form.titleCreate')"
  titleIcon="fa-regular fa-bell text-primary"
  [closeAriaLabel]="t('detail.close')">

  <div class="flex flex-col gap-3">
    <mp-form-field [label]="t('form.titleLabel')">
      <input mpInput [placeholder]="t('form.titlePlaceholder')" [formField]="f.title" />
    </mp-form-field>

    <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-3 sm:items-end">
      <mp-form-field [label]="t('form.category')">
        <mp-select
          [options]="categories()"
          optionLabel="name"
          optionValue="id"
          [placeholder]="t('form.categoryPlaceholder')"
          [formField]="f.categoryId"
          class="w-full">
        </mp-select>
      </mp-form-field>

      @if (canPin()) {
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-muted-foreground">{{ t('form.pinLabel') }}</label>
          <label class="flex items-start gap-2 text-sm">
            <mp-checkbox [formField]="f.isPinned">
            </mp-checkbox>
            <span class="text-muted-foreground text-xs leading-snug">{{ t('form.pinHint') }}</span>
          </label>
        </div>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-foreground">{{ t('form.audienceLabel') }}</label>
      <div class="flex flex-wrap gap-2">
        @for (a of audienceChoices(); track a.key) {
          <button
            type="button"
            class="mp-chip"
            [class.mp-chip-active]="isSelected(a.key)"
            [attr.aria-pressed]="isSelected(a.key)"
            (click)="toggleAudience(a.key)">
            @if (isSelected(a.key)) {
              <i class="fa-solid fa-check"></i>
            }
            {{ audienceLabel(a) }}
          </button>
        }
      </div>
    </div>

    <div class="flex flex-col gap-1 max-w-[18rem]">
      <label class="text-xs font-medium text-muted-foreground">{{ t('form.expiresLabel') }}</label>
      <mp-date-picker
        [formField]="f.expiresAt"
        [showTime]="true"
        [minDate]="minExpiryDate()"
        [placeholder]="t('form.expiresPlaceholder')"
        class="w-full">
      </mp-date-picker>
      <span class="text-xs text-muted-foreground leading-snug">{{ t('form.expiresHint') }}</span>
    </div>

    <mp-form-field [label]="t('form.bodyLabel')">
      <textarea mpTextarea rows="5" [placeholder]="t('form.bodyPlaceholder')" [formField]="f.detail">
      </textarea>
    </mp-form-field>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-foreground">{{ t('form.attachmentsLabel') }}</label>
      <mp-bulletin-attachments
        [mode]="isEdit() ? 'edit' : 'stage'"
        [bulletinId]="isEdit() ? existing()?.id ?? null : null"
        [directoryId]="isEdit() ? existing()?.directoryId ?? null : null">
      </mp-bulletin-attachments>
    </div>
  </div>

  <div mpDialogFooter class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <label class="flex items-center gap-2 text-sm">
      <mp-checkbox [formField]="f.requiresAck">
      </mp-checkbox>
      <span>{{ t('form.requireAck') }}</span>
    </label>

    <div class="flex items-center gap-2 sm:justify-end">
      <button mpButton
        class="flex-1 sm:flex-initial w-full sm:w-auto"
        variant="ghost"
        (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
      <button mpButton
        class="flex-1 sm:flex-initial w-full sm:w-auto"
        [disabled]="!isDirty() || f().submitting()"
        (click)="publish()"><i class="fa-solid" [class.fa-check]="!f().submitting() && isEdit()" [class.fa-paper-plane]="!f().submitting() && !isEdit()" [class.fa-spinner]="f().submitting()" [class.fa-spin]="f().submitting()"></i> {{ isEdit() ? t('form.saveChanges') : t('form.publish') }}</button>
    </div>
  </div>
</mp-dialog>
</ng-container>

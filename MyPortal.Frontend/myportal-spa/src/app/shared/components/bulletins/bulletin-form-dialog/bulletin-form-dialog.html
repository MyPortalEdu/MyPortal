<ng-container *transloco="let t; prefix: 'bulletins'">
<mp-dialog
  [visible]="visible()"
  [modal]="true"
  [dismissable]="false"
  [closeOnEscape]="!isDirty()"
  panelClass="w-[min(44rem,94vw)]"
  (closed)="onHide()">

  <div class="flex items-center justify-between p-4 border-b border-surface">
    <div class="flex items-center gap-2">
      <i class="fa-regular fa-bell text-primary"></i>
      <h3 class="text-base font-semibold m-0">{{ isEdit() ? t('form.titleEdit') : t('form.titleCreate') }}</h3>
    </div>
    <button type="button" class="mp-icon-button" (click)="onCancel()" [attr.aria-label]="t('detail.close')">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="p-4 flex flex-col gap-3">
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.titleLabel') }}</label>
      <input
        mpInput
        [placeholder]="t('form.titlePlaceholder')"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        (blur)="markTouched('title')"
        required
        name="title"
        #titleRef="ngModel"
        [invalid]="wasTouched('title') && titleRef.invalid" />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-3 sm:items-end">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-muted-color">{{ t('form.category') }}</label>
        <mp-select
          [options]="categories()"
          optionLabel="name"
          optionValue="id"
          [placeholder]="t('form.categoryPlaceholder')"
          [ngModel]="categoryId()"
          (ngModelChange)="categoryId.set($event)"
          (onBlur)="markTouched('categoryId')"
          [style]="{ width: '100%' }"
          required
          name="categoryId"
          #categoryRef="ngModel"
          [invalid]="wasTouched('categoryId') && categoryRef.invalid">
        </mp-select>
      </div>

      @if (canPin()) {
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-muted-color">{{ t('form.pinLabel') }}</label>
          <label class="flex items-start gap-2 text-sm">
            <mp-checkbox
              [ngModel]="isPinned()"
              (ngModelChange)="isPinned.set($event)">
            </mp-checkbox>
            <span class="text-muted-color text-xs leading-snug">{{ t('form.pinHint') }}</span>
          </label>
        </div>
      }
    </div>

    <!-- Audience. Active state is fixed primary tint (unlike the feed's
         category chips which use per-category colours). -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.audienceLabel') }}</label>
      <div class="flex flex-wrap gap-2">
        @for (a of audienceChoices(); track a.key) {
          <button
            type="button"
            class="mp-chip"
            [class.mp-chip-active]="isSelected(a.key)"
            [attr.aria-pressed]="isSelected(a.key)"
            (click)="toggleAudience(a.key)">
            @if (isSelected(a.key)) {
              <i class="fa-solid fa-check"></i>
            }
            {{ audienceLabel(a) }}
          </button>
        }
      </div>
    </div>

    <!-- Expiry. Optional: when set, the bulletin disappears from feeds after
         this instant (creator still sees it). Server validator rejects past
         instants, so the picker's minDate matches. -->
    <div class="flex flex-col gap-1 max-w-[18rem]">
      <label class="text-xs font-medium text-muted-color">{{ t('form.expiresLabel') }}</label>
      <p-datepicker
        [ngModel]="expiresAt()"
        (ngModelChange)="expiresAt.set($event)"
        [showTime]="true"
        hourFormat="24"
        [showButtonBar]="true"
        [minDate]="minExpiryDate()"
        [placeholder]="t('form.expiresPlaceholder')"
        appendTo="body"
        [style]="{ width: '100%' }">
      </p-datepicker>
      <span class="text-xs text-muted-color leading-snug">{{ t('form.expiresHint') }}</span>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.bodyLabel') }}</label>
      <textarea
        mpTextarea
        rows="5"
        [placeholder]="t('form.bodyPlaceholder')"
        [ngModel]="detail()"
        (ngModelChange)="detail.set($event)"
        (blur)="markTouched('detail')"
        required
        name="detail"
        #detailRef="ngModel"
        [invalid]="wasTouched('detail') && detailRef.invalid">
      </textarea>
    </div>

    <!-- Attachments. In create mode the widget stages files in memory and the
         publish() handler flushes them via uploadStaged() after the bulletin
         exists. In edit mode it talks to the API directly. -->
    <div class="flex flex-col gap-1">
      <label class="text-xs font-medium text-muted-color">{{ t('form.attachmentsLabel') }}</label>
      <mp-bulletin-attachments
        [mode]="isEdit() ? 'edit' : 'stage'"
        [bulletinId]="isEdit() ? existing()?.id ?? null : null"
        [directoryId]="isEdit() ? existing()?.directoryId ?? null : null">
      </mp-bulletin-attachments>
    </div>
  </div>

  <!-- Footer. On mobile the checkbox label + Cancel + Publish get cramped
       in one row, so we stack: checkbox row on top, then a button row
       beneath with each button taking half the width for big tap targets.
       sm: and up returns to the desktop "checkbox left, buttons right" layout.
       bg-emphasis + rounded-b-xl anchors the actions strip as a distinct
       "modal footer" zone, matched on every dialog footer in the app. -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 p-4 border-t border-surface bg-emphasis rounded-b-xl">
    <label class="flex items-center gap-2 text-sm">
      <mp-checkbox
        [ngModel]="requiresAck()"
        (ngModelChange)="requiresAck.set($event)">
      </mp-checkbox>
      <span>{{ t('form.requireAck') }}</span>
    </label>

    <div class="flex items-center gap-2 sm:justify-end">
      <button mpButton
        class="flex-1 sm:flex-initial w-full sm:w-auto"
        variant="ghost"
        (click)="onCancel()">{{ 'common.cancel' | transloco }}</button>
      <button mpButton
        class="flex-1 sm:flex-initial w-full sm:w-auto"
        [disabled]="(!isValid() || !isDirty()) || submitting()"
        (click)="publish()"><i class="fa-solid" [class.fa-check]="!submitting() && isEdit()" [class.fa-paper-plane]="!submitting() && !isEdit()" [class.fa-spinner]="submitting()" [class.fa-spin]="submitting()"></i> {{ isEdit() ? t('form.saveChanges') : t('form.publish') }}</button>
    </div>
  </div>
</mp-dialog>
</ng-container>

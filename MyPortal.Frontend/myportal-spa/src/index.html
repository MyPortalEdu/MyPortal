<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyPortal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Apply the dark-mode class before Angular bootstraps so the first paint matches the
    // user's saved preference — no light → dark flicker. Tri-state: 'light' | 'dark' |
    // 'system' (default). 'system' follows the OS prefers-color-scheme media query.
    try {
      var theme = localStorage.getItem('mp:theme') || 'system';
      var dark = theme === 'dark'
        || (theme === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('mp-dark');
    } catch { /* private mode / disabled storage — fall through to default theme */ }
  </script>
</head>
<body>
  <mp-root></mp-root>
</body>
</html>

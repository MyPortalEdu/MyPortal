<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyPortal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Apply the dark-mode class before Angular bootstraps so the first paint matches the
    // user's saved preference — no light → dark flicker.
    try {
      if (localStorage.getItem('mp:dark') === '1') {
        document.documentElement.classList.add('mp-dark');
      }
    } catch { /* private mode / disabled storage — fall through to default theme */ }
  </script>
</head>
<body>
  <mp-root></mp-root>
</body>
</html>
